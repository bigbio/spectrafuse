<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 900" width="820" height="900">
  <defs>
    <style>
      .station-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #333333; }
      .station-sublabel { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #777777; }
      .legend-text { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; fill: #555555; }
      .legend-title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #333333; }
      .tool-badge { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 8.5px; font-weight: 700; fill: #ffffff; letter-spacing: 0.3px; }
      .skip-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #999999; font-style: italic; }
      .mode-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; font-weight: 700; }
      .mode-sublabel { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; }
      .section-title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: 600; fill: #aaaaaa; letter-spacing: 1.5px; }
    </style>
  </defs>

  <rect width="820" height="900" fill="#ffffff"/>

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">SpectrafUSE Pipeline</text>
  <text x="410" y="50" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#999">Spectral clustering for PRIDE/MSnet proteomics reanalysis</text>

  <!-- ═══════════════ LEGEND ═══════════════ -->
  <g transform="translate(610, 72)">
    <rect x="-12" y="-18" width="210" height="160" rx="6" fill="#fafafa" stroke="#e8e8e8" stroke-width="1"/>
    <text x="0" y="0" class="legend-title">LEGEND</text>
    <circle cx="10" cy="22" r="7" fill="#555"/>
    <text x="26" y="26" class="legend-text">Process / module</text>
    <circle cx="10" cy="46" r="6" fill="#ffffff" stroke="#555" stroke-width="2.5"/>
    <text x="26" y="50" class="legend-text">Output file</text>
    <line x1="2" y1="68" x2="18" y2="68" stroke="#555" stroke-width="4"/>
    <text x="26" y="72" class="legend-text">Data flow</text>
    <line x1="2" y1="90" x2="18" y2="90" stroke="#555" stroke-width="3" stroke-dasharray="6,4"/>
    <text x="26" y="94" class="legend-text">External input</text>
    <line x1="0" y1="108" x2="192" y2="108" stroke="#e8e8e8" stroke-width="1"/>
    <rect x="2" y="116" width="14" height="10" rx="2" fill="#00897B"/>
    <text x="26" y="125" class="legend-text">Full Mode (default)</text>
    <rect x="2" y="134" width="14" height="10" rx="2" fill="#7B1FA2"/>
    <text x="26" y="143" class="legend-text">Incremental Mode</text>
  </g>

  <!-- ═══════════════ INPUT ═══════════════ -->
  <circle cx="300" cy="100" r="9" fill="#1565C0" stroke="#ffffff" stroke-width="2"/>
  <text x="320" y="97" class="station-label">QPX Parquet Files</text>
  <text x="320" y="112" class="station-sublabel">.psm.parquet + .run.parquet + .sample.parquet</text>

  <!-- Input to router -->
  <line x1="300" y1="109" x2="300" y2="160" stroke="#1565C0" stroke-width="5" stroke-linecap="round"/>

  <!-- Router diamond -->
  <polygon points="300,160 330,190 300,220 270,190" fill="#ffffff" stroke="#1565C0" stroke-width="2.5"/>
  <text x="300" y="193" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#1565C0">--mode</text>

  <!-- ═══════════════ COLUMN HEADERS ═══════════════ -->
  <text x="160" y="265" text-anchor="middle" class="mode-label" fill="#00897B">Full Mode</text>
  <text x="160" y="280" text-anchor="middle" class="mode-sublabel" fill="#00897B">(default)</text>

  <text x="580" y="265" text-anchor="middle" class="mode-label" fill="#7B1FA2">Incremental Mode</text>

  <!-- Router to Full -->
  <path d="M 280,205 Q 220,240 160,290" fill="none" stroke="#00897B" stroke-width="5" stroke-linecap="round"/>
  <!-- Router to Incremental -->
  <path d="M 320,205 Q 450,240 580,290" fill="none" stroke="#7B1FA2" stroke-width="5" stroke-linecap="round"/>

  <!-- ═══════════════ FULL MODE (Teal) ═══════════════ -->

  <!-- S1: PARQUET_TO_DAT -->
  <circle cx="160" cy="320" r="9" fill="#00897B" stroke="#ffffff" stroke-width="2"/>
  <rect x="175" y="311" width="88" height="17" rx="3" fill="#00897B"/>
  <text x="219" y="323" text-anchor="middle" class="tool-badge">PARQUET_TO_DAT</text>
  <text x="275" y="323" class="station-label">Parquet to .dat</text>
  <text x="275" y="338" class="station-sublabel">~100 bytes/spectrum binary format</text>

  <line x1="160" y1="329" x2="160" y2="390" stroke="#00897B" stroke-width="5" stroke-linecap="round"/>

  <!-- S2: Group by charge (small) -->
  <circle cx="160" cy="400" r="6" fill="#00897B" stroke="#ffffff" stroke-width="1.5"/>
  <text x="175" y="404" class="station-sublabel" fill="#00897B" font-weight="600">Group by charge</text>

  <line x1="160" y1="406" x2="160" y2="470" stroke="#00897B" stroke-width="5" stroke-linecap="round"/>

  <!-- S3: RUN_MARACLUSTER_DAT -->
  <circle cx="160" cy="490" r="9" fill="#00897B" stroke="#ffffff" stroke-width="2"/>
  <rect x="40" y="481" width="110" height="17" rx="3" fill="#00897B"/>
  <text x="95" y="493" text-anchor="middle" class="tool-badge">RUN_MARACLUSTER_DAT</text>
  <text x="175" y="493" class="station-label">MaRaCluster -D</text>
  <text x="175" y="508" class="station-sublabel">reads .dat files directly</text>

  <line x1="160" y1="499" x2="160" y2="570" stroke="#00897B" stroke-width="5" stroke-linecap="round"/>

  <!-- S4: BUILD_CLUSTER_DB -->
  <circle cx="160" cy="590" r="9" fill="#00897B" stroke="#ffffff" stroke-width="2"/>
  <rect x="50" y="581" width="100" height="17" rx="3" fill="#00897B"/>
  <text x="100" y="593" text-anchor="middle" class="tool-badge">BUILD_CLUSTER_DB</text>
  <text x="175" y="593" class="station-label">Build Cluster DB</text>
  <text x="175" y="608" class="station-sublabel">metadata + membership parquets</text>

  <!-- ═══════════════ INCREMENTAL MODE (Purple) ═══════════════ -->

  <!-- Existing Cluster DB input (dashed) -->
  <circle cx="750" cy="290" r="7" fill="#ffffff" stroke="#7B1FA2" stroke-width="2.5"/>
  <text x="750" y="275" text-anchor="middle" class="station-sublabel" fill="#7B1FA2">Existing Cluster DB</text>
  <path d="M 743,297 L 555,340" stroke="#7B1FA2" stroke-width="3" stroke-dasharray="6,4" fill="none" stroke-linecap="round"/>

  <!-- Parallel split: two rails from header -->
  <!-- Left rail: EXTRACT_REPRESENTATIVES -->
  <path d="M 580,290 L 540,320" fill="none" stroke="#7B1FA2" stroke-width="5" stroke-linecap="round"/>
  <line x1="540" y1="320" x2="540" y2="410" stroke="#7B1FA2" stroke-width="5" stroke-linecap="round"/>

  <circle cx="540" cy="340" r="9" fill="#7B1FA2" stroke="#ffffff" stroke-width="2"/>
  <rect x="414" y="331" width="115" height="17" rx="3" fill="#7B1FA2"/>
  <text x="471" y="343" text-anchor="middle" class="tool-badge">EXTRACT_REPRESENTATIVES</text>
  <text x="460" y="360" text-anchor="end" class="station-label">Extract Reps</text>
  <text x="460" y="375" text-anchor="end" class="station-sublabel">one spectrum per existing cluster</text>

  <!-- Right rail: Convert new data -->
  <path d="M 580,290 L 620,320" fill="none" stroke="#7B1FA2" stroke-width="5" stroke-linecap="round"/>
  <line x1="620" y1="320" x2="620" y2="410" stroke="#7B1FA2" stroke-width="5" stroke-linecap="round"/>

  <circle cx="620" cy="340" r="9" fill="#7B1FA2" stroke="#ffffff" stroke-width="2"/>
  <rect x="635" y="331" width="100" height="17" rx="3" fill="#7B1FA2"/>
  <text x="685" y="343" text-anchor="middle" class="tool-badge">CONVERT_NEW_DATA</text>
  <text x="635" y="360" class="station-label">New Data</text>
  <text x="635" y="375" class="station-sublabel">convert new project PSMs</text>

  <!-- Merge rails -->
  <path d="M 540,410 L 580,440" fill="none" stroke="#7B1FA2" stroke-width="5" stroke-linecap="round"/>
  <path d="M 620,410 L 580,440" fill="none" stroke="#7B1FA2" stroke-width="5" stroke-linecap="round"/>

  <line x1="580" y1="440" x2="580" y2="480" stroke="#7B1FA2" stroke-width="5" stroke-linecap="round"/>

  <!-- S3: RUN_MARACLUSTER -->
  <circle cx="580" cy="500" r="9" fill="#7B1FA2" stroke="#ffffff" stroke-width="2"/>
  <rect x="480" y="491" width="90" height="17" rx="3" fill="#7B1FA2"/>
  <text x="525" y="503" text-anchor="middle" class="tool-badge">RUN_MARACLUSTER</text>
  <text x="595" y="503" class="station-label">MaRaCluster</text>
  <text x="595" y="518" class="station-sublabel">reps + new data together</text>

  <line x1="580" y1="509" x2="580" y2="570" stroke="#7B1FA2" stroke-width="5" stroke-linecap="round"/>

  <!-- S4: MERGE_INCREMENTAL -->
  <circle cx="580" cy="590" r="9" fill="#7B1FA2" stroke="#ffffff" stroke-width="2"/>
  <rect x="470" y="581" width="100" height="17" rx="3" fill="#7B1FA2"/>
  <text x="520" y="593" text-anchor="middle" class="tool-badge">MERGE_INCREMENTAL</text>
  <text x="595" y="593" class="station-label">Merge Clusters</text>
  <text x="595" y="608" class="station-sublabel">resolve IDs, update membership</text>

  <!-- ═══════════════ OUTPUTS ═══════════════ -->
  <text x="370" y="680" text-anchor="middle" class="section-title">OUTPUTS</text>

  <!-- Full to outputs -->
  <path d="M 160,599 L 160,700 L 290,730" fill="none" stroke="#00897B" stroke-width="4" stroke-linecap="round"/>
  <!-- Incremental to outputs -->
  <path d="M 580,599 L 580,700 L 450,730" fill="none" stroke="#7B1FA2" stroke-width="4" stroke-linecap="round"/>

  <!-- Output 1: Cluster DB -->
  <circle cx="370" cy="740" r="8" fill="#ffffff" stroke="#F57C00" stroke-width="2.5"/>
  <text x="388" y="737" class="station-label" fill="#F57C00">Cluster DB</text>
  <text x="388" y="753" class="station-sublabel">cluster_metadata.parquet</text>
  <text x="388" y="766" class="station-sublabel">psm_cluster_membership.parquet</text>

  <!-- Full to MaRaCluster Results -->
  <path d="M 160,700 L 290,810" fill="none" stroke="#00897B" stroke-width="4" stroke-linecap="round"/>
  <!-- Incremental to MaRaCluster Results -->
  <path d="M 580,700 L 450,810" fill="none" stroke="#7B1FA2" stroke-width="4" stroke-linecap="round"/>

  <!-- Output 2: MaRaCluster Results -->
  <circle cx="370" cy="820" r="8" fill="#ffffff" stroke="#F57C00" stroke-width="2.5"/>
  <text x="388" y="817" class="station-label" fill="#F57C00">MaRaCluster Results</text>
  <text x="388" y="833" class="station-sublabel">clusters_pN.tsv</text>

  <!-- Footer -->
  <text x="410" y="878" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#ccc">SpectrafUSE v0.0.4 — Nextflow DSL2</text>

</svg>
