<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 820" width="880" height="820">
  <defs>
    <style>
      .label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #333; }
      .sublabel { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10.5px; fill: #888; }
      .badge { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 8px; font-weight: 700; fill: #fff; letter-spacing: 0.4px; }
      .legend-text { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #666; }
      .legend-title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #333; }
      .col-title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 15px; font-weight: 700; }
      .col-sub { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-style: italic; }
    </style>
  </defs>

  <rect width="880" height="820" fill="#ffffff"/>

  <!-- ══════ TITLE ══════ -->
  <text x="440" y="30" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">SpectrafUSE Pipeline</text>
  <text x="440" y="46" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#aaa">Spectral clustering for PRIDE/MSnet proteomics reanalysis</text>

  <!-- ══════ LEGEND ══════ -->
  <g transform="translate(660, 68)">
    <rect x="-8" y="-14" width="200" height="120" rx="5" fill="#fafafa" stroke="#eee" stroke-width="1"/>
    <text x="0" y="0" class="legend-title">LEGEND</text>
    <circle cx="8" cy="18" r="5.5" fill="#666"/>
    <text x="22" y="22" class="legend-text">Process</text>
    <circle cx="8" cy="38" r="5" fill="none" stroke="#666" stroke-width="2"/>
    <text x="22" y="42" class="legend-text">Output</text>
    <line x1="2" y1="56" x2="14" y2="56" stroke="#666" stroke-width="3.5"/>
    <text x="22" y="60" class="legend-text">Data flow</text>
    <line x1="2" y1="74" x2="14" y2="74" stroke="#666" stroke-width="2.5" stroke-dasharray="5,3"/>
    <text x="22" y="78" class="legend-text">External input</text>
    <rect x="2" y="88" width="10" height="8" rx="2" fill="#00897B"/>
    <text x="22" y="96" class="legend-text">Full</text>
    <rect x="60" y="88" width="10" height="8" rx="2" fill="#7B1FA2"/>
    <text x="80" y="96" class="legend-text">Incremental</text>
  </g>

  <!-- ══════ SHARED INPUT ══════ -->
  <circle cx="440" cy="90" r="8" fill="#1565C0" stroke="#fff" stroke-width="2"/>
  <text x="440" y="86" text-anchor="end" dx="-16" class="label" fill="#1565C0">QPX Parquet Files</text>
  <text x="440" y="100" text-anchor="end" dx="-16" class="sublabel">.psm.parquet  .run.parquet  .sample.parquet</text>

  <line x1="440" y1="98" x2="440" y2="130" stroke="#1565C0" stroke-width="4" stroke-linecap="round"/>

  <!-- Router -->
  <polygon points="440,130 460,150 440,170 420,150" fill="#fff" stroke="#1565C0" stroke-width="2"/>
  <text x="440" y="153" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="bold" fill="#1565C0">--mode</text>

  <!-- ══════ COLUMN BACKGROUNDS ══════ -->
  <rect x="30" y="195" width="370" height="420" rx="10" fill="#f7fafa" stroke="#e0eded" stroke-width="1"/>
  <rect x="480" y="195" width="370" height="420" rx="10" fill="#faf7fc" stroke="#ede0f0" stroke-width="1"/>

  <!-- Column headers -->
  <text x="215" y="220" text-anchor="middle" class="col-title" fill="#00897B">Full Mode</text>
  <text x="215" y="234" text-anchor="middle" class="col-sub" fill="#00897B">(default)</text>

  <text x="665" y="220" text-anchor="middle" class="col-title" fill="#7B1FA2">Incremental Mode</text>

  <!-- Router to columns -->
  <path d="M 430,163 Q 340,185 215,250" fill="none" stroke="#00897B" stroke-width="4" stroke-linecap="round"/>
  <path d="M 450,163 Q 540,185 665,250" fill="none" stroke="#7B1FA2" stroke-width="4" stroke-linecap="round"/>

  <!-- ══════════════════════════════════════════════ -->
  <!--              FULL MODE COLUMN                  -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- Step 1: PARQUET_TO_DAT -->
  <line x1="215" y1="250" x2="215" y2="290" stroke="#00897B" stroke-width="4" stroke-linecap="round"/>
  <circle cx="215" cy="290" r="8" fill="#00897B" stroke="#fff" stroke-width="2"/>
  <rect x="230" y="282" width="82" height="15" rx="3" fill="#00897B"/>
  <text x="271" y="293" text-anchor="middle" class="badge">PARQUET_TO_DAT</text>
  <text x="320" y="293" class="label">Parquet to .dat</text>
  <text x="320" y="306" class="sublabel">~100 bytes/spectrum</text>

  <!-- Step 2: Group by charge -->
  <line x1="215" y1="298" x2="215" y2="345" stroke="#00897B" stroke-width="4" stroke-linecap="round"/>
  <circle cx="215" cy="345" r="5" fill="#00897B" stroke="#fff" stroke-width="1.5"/>
  <text x="230" y="349" class="sublabel" fill="#00897B" font-weight="600">Group by charge</text>

  <!-- Step 3: RUN_MARACLUSTER_DAT -->
  <line x1="215" y1="350" x2="215" y2="400" stroke="#00897B" stroke-width="4" stroke-linecap="round"/>
  <circle cx="215" cy="400" r="8" fill="#00897B" stroke="#fff" stroke-width="2"/>
  <rect x="60" y="392" width="105" height="15" rx="3" fill="#00897B"/>
  <text x="112" y="403" text-anchor="middle" class="badge">RUN_MARACLUSTER_DAT</text>
  <text x="230" y="403" class="label">MaRaCluster -D</text>
  <text x="230" y="416" class="sublabel">reads .dat files directly</text>

  <!-- Step 4: BUILD_CLUSTER_DB -->
  <line x1="215" y1="408" x2="215" y2="480" stroke="#00897B" stroke-width="4" stroke-linecap="round"/>
  <circle cx="215" cy="480" r="8" fill="#00897B" stroke="#fff" stroke-width="2"/>
  <rect x="72" y="472" width="93" height="15" rx="3" fill="#00897B"/>
  <text x="118" y="483" text-anchor="middle" class="badge">BUILD_CLUSTER_DB</text>
  <text x="230" y="483" class="label">Build Cluster DB</text>
  <text x="230" y="496" class="sublabel">metadata + membership parquets</text>

  <!-- Full mode output line -->
  <line x1="215" y1="488" x2="215" y2="570" stroke="#00897B" stroke-width="4" stroke-linecap="round"/>

  <!-- ══════════════════════════════════════════════ -->
  <!--           INCREMENTAL MODE COLUMN              -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- Existing Cluster DB (dashed input) -->
  <circle cx="810" cy="256" r="6" fill="none" stroke="#7B1FA2" stroke-width="2"/>
  <text x="798" y="248" text-anchor="end" class="sublabel" fill="#7B1FA2">Existing Cluster DB</text>
  <path d="M 804,260 L 710,290" stroke="#7B1FA2" stroke-width="2.5" stroke-dasharray="5,3" fill="none" stroke-linecap="round"/>

  <!-- Parallel split -->
  <line x1="665" y1="250" x2="665" y2="265" stroke="#7B1FA2" stroke-width="4" stroke-linecap="round"/>

  <!-- Left rail -->
  <path d="M 665,265 L 610,290" fill="none" stroke="#7B1FA2" stroke-width="4" stroke-linecap="round"/>
  <circle cx="610" cy="290" r="8" fill="#7B1FA2" stroke="#fff" stroke-width="2"/>
  <rect x="490" y="282" width="110" height="15" rx="3" fill="#7B1FA2"/>
  <text x="545" y="293" text-anchor="middle" class="badge">EXTRACT_REPRESENTATIVES</text>
  <text x="500" y="310" class="label">Extract Reps</text>
  <text x="500" y="323" class="sublabel">one spectrum per cluster</text>

  <line x1="610" y1="298" x2="610" y2="370" stroke="#7B1FA2" stroke-width="4" stroke-linecap="round"/>

  <!-- Right rail -->
  <path d="M 665,265 L 720,290" fill="none" stroke="#7B1FA2" stroke-width="4" stroke-linecap="round"/>
  <circle cx="720" cy="290" r="8" fill="#7B1FA2" stroke="#fff" stroke-width="2"/>
  <rect x="735" y="282" width="90" height="15" rx="3" fill="#7B1FA2"/>
  <text x="780" y="293" text-anchor="middle" class="badge">CONVERT_NEW_DATA</text>
  <text x="735" y="310" class="label">New Data</text>
  <text x="735" y="323" class="sublabel">convert new project PSMs</text>

  <line x1="720" y1="298" x2="720" y2="370" stroke="#7B1FA2" stroke-width="4" stroke-linecap="round"/>

  <!-- Merge rails -->
  <path d="M 610,370 L 665,400" fill="none" stroke="#7B1FA2" stroke-width="4" stroke-linecap="round"/>
  <path d="M 720,370 L 665,400" fill="none" stroke="#7B1FA2" stroke-width="4" stroke-linecap="round"/>

  <!-- Step 3: RUN_MARACLUSTER -->
  <circle cx="665" cy="400" r="8" fill="#7B1FA2" stroke="#fff" stroke-width="2"/>
  <rect x="680" y="392" width="82" height="15" rx="3" fill="#7B1FA2"/>
  <text x="721" y="403" text-anchor="middle" class="badge">RUN_MARACLUSTER</text>
  <text x="770" y="403" class="label">MaRaCluster</text>
  <text x="770" y="416" class="sublabel">reps + new data together</text>

  <!-- Step 4: MERGE_INCREMENTAL -->
  <line x1="665" y1="408" x2="665" y2="480" stroke="#7B1FA2" stroke-width="4" stroke-linecap="round"/>
  <circle cx="665" cy="480" r="8" fill="#7B1FA2" stroke="#fff" stroke-width="2"/>
  <rect x="680" y="472" width="93" height="15" rx="3" fill="#7B1FA2"/>
  <text x="726" y="483" text-anchor="middle" class="badge">MERGE_INCREMENTAL</text>
  <text x="780" y="483" class="label">Merge Clusters</text>
  <text x="780" y="496" class="sublabel">resolve IDs, update membership</text>

  <!-- Incremental output line -->
  <line x1="665" y1="488" x2="665" y2="570" stroke="#7B1FA2" stroke-width="4" stroke-linecap="round"/>

  <!-- ══════════════════════════════════════════════ -->
  <!--                  OUTPUTS                       -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- Output background -->
  <rect x="130" y="640" width="620" height="130" rx="10" fill="#fff8f0" stroke="#f0e0c8" stroke-width="1"/>
  <text x="440" y="660" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" fill="#bbb" letter-spacing="1.5px">OUTPUTS</text>

  <!-- Full to output box -->
  <path d="M 215,570 L 215,640" fill="none" stroke="#00897B" stroke-width="4" stroke-linecap="round"/>
  <!-- Incremental to output box -->
  <path d="M 665,570 L 665,640" fill="none" stroke="#7B1FA2" stroke-width="4" stroke-linecap="round"/>

  <!-- Output 1: Cluster DB -->
  <circle cx="320" cy="700" r="7" fill="none" stroke="#F57C00" stroke-width="2.5"/>
  <text x="336" y="697" class="label" fill="#F57C00">Cluster DB</text>
  <text x="336" y="711" class="sublabel">cluster_metadata.parquet</text>
  <text x="336" y="723" class="sublabel">psm_cluster_membership.parquet</text>

  <!-- Output 2: MaRaCluster Results -->
  <circle cx="580" cy="700" r="7" fill="none" stroke="#F57C00" stroke-width="2.5"/>
  <text x="596" y="697" class="label" fill="#F57C00">MaRaCluster Results</text>
  <text x="596" y="711" class="sublabel">clusters_pN.tsv</text>

  <!-- Lines from columns down into output area (straight down, no crossing) -->
  <!-- small horizontal connector inside box -->
  <path d="M 215,640 L 215,670 L 313,700" fill="none" stroke="#00897B" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <path d="M 665,640 L 665,670 L 587,700" fill="none" stroke="#7B1FA2" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Footer -->
  <text x="440" y="800" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#ccc">SpectrafUSE v0.0.4 — Nextflow DSL2</text>

</svg>
