name: nf-core CI                                                                                                                              
  # Validates that the pipeline syntax is correct and test data is well-formed                                                                  
  on:                                                                                                                                           
    push:                                                   
      branches:
        - dev
        - main
    pull_request:
    workflow_dispatch:

  env:
    NXF_ANSI_LOG: false
                                                                                                                                                
  concurrency:
    group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"                                                       
    cancel-in-progress: true                                

  jobs:
    syntax-check:
      name: Nextflow syntax validation
      runs-on: ubuntu-latest                                                                                                                    
      steps:
        - name: Check out pipeline code                                                                                                         
          uses: actions/checkout@v4                         
          with:
            fetch-depth: 0

        - uses: actions/setup-java@v4
          with:
            distribution: "temurin"                                                                                                             
            java-version: "17"
                                                                                                                                                
        - name: Set up Nextflow                             
          uses: nf-core/setup-nextflow@v2
          with:
            version: "25.04.0"

        - name: Validate pipeline syntax (preview mode)                                                                                         
          run: |
            nextflow run ${GITHUB_WORKSPACE} \                                                                                                  
              -preview \                                    
              --parquet_dir ${GITHUB_WORKSPACE}/test_data \
              --default_species "Homo sapiens" \
              --default_instrument "Q Exactive HF"
                                                                                                                                                
        - name: Validate incremental mode syntax
          run: |                                                                                                                                
            nextflow run ${GITHUB_WORKSPACE} \              
              -preview \
              --parquet_dir ${GITHUB_WORKSPACE}/test_data \
              --mode incremental \                                                                                                              
              --existing_cluster_db ${GITHUB_WORKSPACE}/test_data \
              --default_species "Homo sapiens" \                                                                                                
              --default_instrument "Q Exactive HF"          

    test-data-check:
      name: Validate test data format
      runs-on: ubuntu-latest                                                                                                                    
      steps:
        - name: Check out pipeline code                                                                                                         
          uses: actions/checkout@v4                         

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"
                                                                                                                                                
        - name: Install dependencies
          run: pip install pyarrow                                                                                                              
                                                            
        - name: Validate QPX test data schema
          run: |
            python -c "
            import pyarrow.parquet as pq
            import sys
                                                                                                                                                
            # Validate PSM parquet
            psm = pq.read_table('test_data/TEST001/TEST001.psm.parquet')                                                                        
            required_cols = ['usi', 'run_file_name', 'sequence', 'charge',
                             'exp_mass_to_charge', 'mz_array', 'intensity_array']                                                               
            for col in required_cols:
                assert col in psm.column_names, f'Missing column: {col}'                                                                        
            assert len(psm) > 0, 'PSM table is empty'       
            print(f'PSM parquet: {len(psm)} rows, columns: {psm.column_names}')                                                                 
   
            # Validate run parquet                                                                                                              
            run = pq.read_table('test_data/TEST001/TEST001.run.parquet')
            assert 'run_file_name' in run.column_names                                                                                          
            assert 'instrument' in run.column_names
            print(f'Run parquet: {len(run)} rows, columns: {run.column_names}')                                                                 
                                                                                                                                                
            # Validate sample parquet
            sample = pq.read_table('test_data/TEST001/TEST001.sample.parquet')                                                                  
            assert 'run_file_name' in sample.column_names   
            assert 'organism' in sample.column_names
            print(f'Sample parquet: {len(sample)} rows, columns: {sample.column_names}')                                                        
   
            print('All QPX test data validated successfully.')                                                                                  
            "                                               

    pipeline-test:
      name: Run pipeline with test data
      needs: [syntax-check, test-data-check]
      runs-on: ubuntu-latest                                                                                                                    
      strategy:
        fail-fast: false                                                                                                                        
        matrix:                                             
          NXF_VER:
            - "25.04.0"

      steps:
        - name: Check out pipeline code
          uses: actions/checkout@v4                                                                                                             
          with:
            fetch-depth: 0                                                                                                                      
                                                            
        - uses: actions/setup-java@v4
          with:
            distribution: "temurin"
            java-version: "17"

        - name: Set up Nextflow                                                                                                                 
          uses: nf-core/setup-nextflow@v2
          with:                                                                                                                                 
            version: "${{ matrix.NXF_VER }}"                

        - name: Disk space cleanup
          uses: jlumbroso/free-disk-space@v1.3.1
                                                                                                                                                
        - name: Run pipeline with test data
          timeout-minutes: 30                                                                                                                   
          run: |                                            
            nextflow run ${GITHUB_WORKSPACE} \
              -profile docker \
              --parquet_dir ${GITHUB_WORKSPACE}/test_data \
              --default_species "Homo sapiens" \                                                                                                
              --default_instrument "Q Exactive HF" \
              --outdir test_results                                                                                                             
                                                            
        - name: Gather failed logs
          if: failure() || cancelled()
          run: |
            mkdir -p failed_logs                                                                                                                
            if [ -f test_results/pipeline_info/execution_trace*.txt ]; then
              failed=$(grep "FAILED" test_results/pipeline_info/execution_trace*.txt | cut -f 2 || true)                                        
              while read -r line ; do                       
                [ -n "$line" ] && cp $(ls work/${line}*/*.log 2>/dev/null) failed_logs/ 2>/dev/null || true                                     
              done <<< "$failed"
            fi                                                                                                                                  
                                                            
        - uses: actions/upload-artifact@v4                                                                                                      
          if: failure() || cancelled()
          name: Upload failed logs                                                                                                              
          with:                                             
            name: failed_logs_${{ matrix.NXF_VER }}_${{ github.run_id }}
            include-hidden-files: true
            path: failed_logs
            if-no-files-found: warn                                                                                                             
   
        - uses: actions/upload-artifact@v4                                                                                                      
          if: always()                                      
          name: Upload nextflow log
          with:
            name: nextflow_log_${{ matrix.NXF_VER }}_${{ github.run_id }}
            include-hidden-files: true                                                                                                          
            path: .nextflow.log
            if-no-files-found: warn  
